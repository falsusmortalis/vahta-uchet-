<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учёт вахт</title>
  <style>
    :root { --bg: #f4f5f7; --card: #fff; --line: #dcdce1; --text: #1a1a1a; --muted: #6b7280; --accent: #2563eb; --accentBg: #eff6ff; --red: #dc2626; --green: #16a34a; --orange: #ea580c; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1, h2 { margin: 0 0 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    button, .btn { padding: 8px 14px; border: 1px solid var(--line); background: var(--card); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    button:hover { background: #f3f4f6; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.danger { color: var(--red); border-color: #fecaca; background: #fef2f2; }
    button.danger:hover { background: #fee2e2; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    label { font-size: 13px; font-weight: 600; color: var(--muted); }
    input, select, textarea { padding: 8px; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
    .modes { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .mode { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--line); background: var(--card); cursor: pointer; }
    .mode.active { background: var(--accentBg); border-color: var(--accent); color: var(--accent); font-weight: 500; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px; border-bottom: 1px solid var(--line); text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    .people-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .person-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #f9fafb; }
    .badge { font-weight: bold; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 12px; }
    .paid { color: var(--accent); background: var(--accentBg); }
    .free { color: var(--green); background: #f0fdf4; }
    .otgul { color: var(--orange); background: #fff7ed; }
    .pg { color: #7c3aed; background: #f5f3ff; }
    .del-btn { padding: 4px 8px; font-size: 12px; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 6px; cursor: pointer; }
    #importStatus { margin-top: 6px; font-size: 13px; min-height: 18px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>📊 Учёт вахт</h1>
    <div class="btns">
      <button onclick="exportData()">📤 Экспорт JSON</button>      <label class="btn primary" for="importFile">📥 Импорт JSON</label>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
      <button class="danger" onclick="resetAll()">🗑 Сбросить всё</button>
    </div>
  </div>
  <div id="importStatus" style="margin-bottom:10px; color:#6b7280"></div>

  <div class="grid">
    <div>
      <div class="card">
        <h2>👥 Сотрудники</h2>
        <div class="row" style="margin-bottom:10px">
          <div class="field" style="flex:1"><input id="newPersonName" placeholder="Фамилия И.О."></div>
          <button class="primary" onclick="addPerson()">Добавить</button>
        </div>
        <div id="peopleList" class="people-list"></div>
      </div>

      <div class="card">
        <h2>🎉 Праздники</h2>
        <div class="muted" style="font-size:12px; margin-bottom:6px">Формат: ГГГГ-ММ-ДД, каждая с новой строки</div>
        <textarea id="holidaysInput"></textarea>
        <div class="btns" style="margin-top:8px">
          <button onclick="saveHolidays()">Сохранить</button>
          <button onclick="loadDefaultHolidays()">РФ 2026</button>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>➕ Добавить запись</h2>
        <div class="modes">
          <div class="mode active" data-type="paid" onclick="setMode(this)">Платная</div>
          <div class="mode" data-type="free" onclick="setMode(this)">Бесплатная</div>
          <div class="mode" data-type="pg" onclick="setMode(this)">ПГ</div>
          <div class="mode" data-type="otgul" onclick="setMode(this)">Отгул</div>
        </div>
        <div class="row">
          <div class="field" style="flex:1"><label>Сотрудник</label><select id="entryPerson"></select></div>
          <div class="field"><label>Дата</label><input type="date" id="entryDate"></div>
          <div class="field" style="width:80px"><label>Кол-во</label><input type="number" id="entryCount" value="1" min="1"></div>
        </div>
        <div class="field"><label>Комментарий</label><input id="entryNote" placeholder="Необязательно"></div>
        <button class="primary" style="width:100%; margin-top:8px" onclick="addEntry()">Сохранить запись</button>
      </div>

      <div class="card">
        <h2>📅 Недельный баланс</h2>
        <div class="row" style="margin-bottom:10px">          <div class="field" style="flex:1"><label>Выбрать сотрудника</label><select id="weekFilterPerson" onchange="renderWeeklyTable()"></select></div>
        </div>
        <div style="overflow:auto">
          <table>
            <thead><tr><th>Неделя</th><th>Платные, ч</th><th>Бесплатные, ч</th><th>Отгул, ч</th><th>Платные, сут/ч</th><th>Бесплатные, сут/ч</th></tr></thead>
            <tbody id="weekTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>📒 Журнал</h2>
        <div style="overflow:auto; max-height:400px">
          <table>
            <thead><tr><th>Дата</th><th>Сотрудник</th><th>Тип</th><th>Часы</th><th>Прим.</th><th>Действие</th></tr></thead>
            <tbody id="journalBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Хранилище данных
  let DB = { people: [], holidays: [], entries: [] };
  let currentMode = 'paid';

  // Безопасный парсер JSON (убирает пробелы в ключах и значениях)
  function cleanObject(obj) {
    if (!obj || typeof obj !== 'object') return obj;
    const clean = {};
    for (const k in obj) {
      const cleanK = k.trim();
      clean[cleanK] = Array.isArray(obj[k]) ? obj[k].map(item => typeof item === 'string' ? item.trim() : cleanObject(item)) : cleanObject(obj[k]);
    }
    return clean;
  }

  // Загрузка из localStorage при старте
  function init() {
    const saved = localStorage.getItem('vahtaDB');
    if (saved) { try { DB = cleanObject(JSON.parse(saved)); } catch(e) {} }
    else { loadDefaultHolidays(); }
    
    // Делегирование событий для кнопок удаления
    document.getElementById('journalBody').addEventListener('click', (e) => {
      const btn = e.target.closest('.del-btn');
      if (btn) deleteEntry(btn.dataset.id);
    });
    renderAll();
  }

  function saveDB() { localStorage.setItem('vahtaDB', JSON.stringify(DB)); renderAll(); }
  function renderAll() { renderPeople(); renderSelects(); renderJournal(); renderWeeklyTable(); document.getElementById('holidaysInput').value = DB.holidays.join('\n'); }

  // --- Сотрудники ---
  function addPerson() {
    const name = document.getElementById('newPersonName').value.trim();
    if (!name || DB.people.includes(name)) return alert('Введите уникальное имя');
    DB.people.push(name);
    document.getElementById('newPersonName').value = '';
    saveDB();
  }
  function removePerson(name) {
    if (!confirm(`Удалить ${name}? Записи останутся в журнале.`)) return;
    DB.people = DB.people.filter(p => p !== name);
    saveDB();
  }
  function renderPeople() {
    document.getElementById('peopleList').innerHTML = DB.people.map(p => `
      <div class="person-item"><span>${p}</span><button class="del-btn" onclick="removePerson('${p}')">Удалить</button></div>`).join('');
  }
  function renderSelects() {
    const opts = DB.people.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('entryPerson').innerHTML = '<option value="">-- Выберите --</option>' + opts;
    document.getElementById('weekFilterPerson').innerHTML = '<option value="">-- Все/Выберите --</option>' + opts;
  }

  // --- Праздники ---
  function saveHolidays() {
    DB.holidays = document.getElementById('holidaysInput').value.split('\n').map(s => s.trim()).filter(Boolean);
    saveDB(); alert('Праздники сохранены');
  }
  function loadDefaultHolidays() {
    DB.holidays = ["2026-01-01","2026-01-02","2026-01-03","2026-01-04","2026-01-05","2026-01-06","2026-01-07","2026-01-08","2026-01-09","2026-01-10","2026-01-11","2026-02-23","2026-03-09","2026-05-01","2026-05-11","2026-06-12","2026-11-04","2026-12-31"];
    saveDB();
  }

  // --- Режимы и добавление записи ---
  function setMode(el) {
    document.querySelectorAll('.mode').forEach(b => b.classList.remove('active'));
    el.classList.add('active'); currentMode = el.dataset.type;
  }
  function addEntry() {
    const person = document.getElementById('entryPerson').value;
    const date = document.getElementById('entryDate').value;
    const count = parseInt(document.getElementById('entryCount').value) || 1;
    const note = document.getElementById('entryNote').value.trim();    if (!person || !date) return alert('Выберите сотрудника и дату');
    DB.entries.push({ id: Date.now().toString(), person, date, type: currentMode, count, note });
    saveDB();
    document.getElementById('entryNote').value = '';
  }
  function deleteEntry(rawId) {
    const idToMatch = String(rawId).trim();
    if (!confirm('Удалить эту запись из журнала? Баланс пересчитается.')) return;
    DB.entries = DB.entries.filter(e => String(e.id).trim() !== idToMatch);
    saveDB();
  }

  // --- Логика расчёта часов ---
  function getHours(dateStr, type) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const date = new Date(y, m-1, d);
    const dow = date.getDay(); // 0=Вс
    const isHoliday = DB.holidays.includes(dateStr);

    if (type === 'paid') return 16;
    if (type === 'otgul') return 0;
    if (type === 'pg') return (dow === 0 || dow === 6 || isHoliday) ? 8 : 0;
    if (type === 'free') {
      if (isHoliday) return 20; // 🎉 Праздник = 20ч
      if (dow === 0) return 16; // Вс
      if (dow === 6) return 20; // Сб
      if (dow === 5) return 12; // Пт
      return 8; // Пн-Чт
    }
    return 0;
  }
  function formatDaysHours(h) {
    if (h <= 0) return '0 сут / 0 ч';
    return `${Math.floor(h / 24)} сут / ${Math.round(h % 24)} ч`;
  }

  // --- Недельная таблица ---
  function renderWeeklyTable() {
    const person = document.getElementById('weekFilterPerson').value;
    const tbody = document.getElementById('weekTableBody');
    if (!person) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6b7280">Выберите сотрудника</td></tr>'; return; }

    const entries = DB.entries.filter(e => e.person === person).sort((a,b) => a.date.localeCompare(b.date));
    const weeks = {};
    let cumPaid = 0, cumFree = 0;

    entries.forEach(e => {
      const [y, m, d] = e.date.split('-').map(Number);
      const date = new Date(y, m-1, d);
      const day = date.getDay();      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(y, m-1, diff);
      const sunday = new Date(y, m-1, diff + 6);
      
      const key = monday.toISOString().slice(0,10);
      const label = `${monday.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'}).slice(0,5)} - ${sunday.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'}).slice(0,5)}`;

      if (!weeks[key]) weeks[key] = { label, paid:0, free:0, otgul:0 };

      const h = getHours(e.date, e.type) * (e.count || 1);
      if (e.type === 'paid') { cumPaid += h; weeks[key].paid += h; }
      else if (e.type === 'free' || e.type === 'pg') { cumFree += h; weeks[key].free += h; }
      else if (e.type === 'otgul') {
        const deduct = 8 * (e.count || 1);
        weeks[key].otgul += deduct;
        // 🔥 НОВАЯ ЛОГИКА: Если бесплатных >= 8, вычитаем из них. Если < 8, не трогаем бесплатные, вычитаем всё из платных.
        if (cumFree >= deduct) {
          cumFree -= deduct;
        } else {
          cumPaid = Math.max(0, cumPaid - deduct);
        }
      }
      weeks[key].cumPaid = cumPaid;
      weeks[key].cumFree = cumFree;
    });

    tbody.innerHTML = Object.keys(weeks).sort().map(k => {
      const w = weeks[k];
      return `<tr><td>${w.label}</td><td>${w.paid}</td><td>${w.free}</td><td class="otgul">${w.otgul || 0}</td><td>${formatDaysHours(w.cumPaid)}</td><td>${formatDaysHours(w.cumFree)}</td></tr>`;
    }).join('') || '<tr><td colspan="6" style="text-align:center">Нет записей</td></tr>';
  }

  // --- Журнал ---
  function renderJournal() {
    const sorted = [...DB.entries].sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('journalBody').innerHTML = sorted.map(e => {
      const safeId = String(e.id).trim();
      return `<tr>
        <td>${e.date}</td>
        <td>${e.person}</td>
        <td><span class="badge ${e.type}">${e.type.toUpperCase()}</span></td>
        <td>${e.type === 'otgul' ? '-8' : getHours(e.date, e.type) * (e.count || 1)}</td>
        <td>${e.note || '-'}</td>
        <td><button class="del-btn" data-id="${safeId}">🗑 Удалить</button></td>
      </tr>`;
    }).join('');
  }

  // --- Импорт / Экспорт ---
  function exportData() {    const blob = new Blob([JSON.stringify(DB, null, 2)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `vahta_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
  }
  function importData(input) {
    const file = input.files[0]; 
    const status = document.getElementById('importStatus');
    if (!file) return;
    status.textContent = '⏳ Чтение файла...';
    status.style.color = '#6b7280';
    
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const raw = JSON.parse(e.target.result);
        const data = cleanObject(raw);
        
        DB.people = Array.isArray(data.people) ? data.people : [];
        DB.entries = Array.isArray(data.entries) ? data.entries : [];
        DB.holidays = Array.isArray(data.holidays) ? data.holidays : [];
        
        DB.entries = DB.entries.map(en => ({
          id: String(en.id || Date.now() + Math.random()).trim(),
          person: String(en.person || '').trim(),
          date: String(en.date || '').trim(),
          type: String(en.type || 'paid').trim().toLowerCase(),
          count: Number(en.count) || 1,
          note: String(en.note || '').trim()
        })).filter(en => en.person && en.date);

        DB.holidays = DB.holidays.filter(h => /^20\d{2}-\d{2}-\d{2}$/.test(h));
        DB.people = DB.people.filter(p => p);

        saveDB();
        status.textContent = `✅ Успешно! Загружено ${DB.entries.length} записей, ${DB.people.length} сотрудников. Логика отгулов обновлена.`;
        status.style.color = '#16a34a';
      } catch(err) { 
        status.textContent = `❌ Ошибка: ${err.message}`;
        status.style.color = '#dc2626';
      }
    };
    reader.readAsText(file, 'UTF-8');
    input.value = '';
  }
  function resetAll() {
    if (!confirm('Удалить ВСЕ данные безвозвратно?')) return;
    DB = { people: [], holidays: [], entries: [] };
    localStorage.removeItem('vahtaDB');
    renderAll();
  }
  init();
</script>
</body>
</html>
